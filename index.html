<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER - Neural Archive & Observation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap');

        /* --- 1. RESET & FOUNDATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-neon: #bf00ff; /* Neon Magenta/Purple */
            --secondary-neon: #00f2ff; /* Electric Cyan */
            --glass-bg: rgba(10, 10, 15, 0.7); 
            --glass-border: rgba(191, 0, 255, 0.25);
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            /* Latar belakang Deep Cosmic Abyss */
            background-color: #050508; 
            color: #e2e8f0;
            overflow-x: hidden;
            perspective: 1000px; 
        }

        /* --- 2. LAYERS (CANVAS & CELESTIAL CORE) --- */
        #science-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Vignette effect untuk kedalaman */
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.9) 100%);
            z-index: -1;
        }

        /* Celestial Core (Atom) Animation */
        .css-atom {
            position: fixed;
            top: 10%;
            right: 5%;
            width: 200px;
            height: 200px;
            z-index: 0;
            pointer-events: none;
            animation: float 8s ease-in-out infinite alternate;
        }

        .nucleus {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 35px;
            height: 35px;
            background: var(--primary-neon);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 40px var(--primary-neon), 0 0 80px var(--secondary-neon);
            animation: pulse 3s infinite alternate;
        }

        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 180px;
            height: 70px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .orbit:nth-child(2) {
            transform: translate(-50%, -50%) rotateZ(45deg) rotateX(70deg);
            animation: spinOrbit1 12s linear infinite;
        }

        .orbit:nth-child(3) {
            transform: translate(-50%, -50%) rotateZ(-45deg) rotateX(70deg);
            animation: spinOrbit2 15s linear infinite;
        }

        .orbit:nth-child(4) {
            transform: translate(-50%, -50%) rotateZ(90deg) rotateX(70deg);
            animation: spinOrbit3 10s linear infinite;
        }

        .electron {
            position: absolute;
            top: -5px;
            left: 50%;
            width: 8px;
            height: 8px;
            background: var(--secondary-neon);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--secondary-neon);
        }

        /* --- INTRO SCREEN --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #050508; 
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1), visibility 1.2s;
        }

        .intro-title {
            font-size: 5rem;
            font-family: 'Space Grotesk', sans-serif;
            color: white;
            letter-spacing: 12px;
            margin-bottom: 15px;
            text-shadow: 0 0 30px rgba(191, 0, 255, 0.8);
            font-weight: 700;
        }

        .intro-subtitle {
            font-size: 1rem;
            color: var(--secondary-neon);
            margin-bottom: 60px;
            letter-spacing: 5px;
            text-transform: uppercase;
            opacity: 0.7;
        }

        .btn-start {
            background: transparent;
            color: white;
            border: 1px solid var(--secondary-neon);
            padding: 18px 50px;
            border-radius: 2px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            text-transform: uppercase;
            letter-spacing: 4px;
            position: relative;
            overflow: hidden;
        }

        .btn-start:hover {
            background: var(--secondary-neon);
            color: #000;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.5);
            transform: scale(1.05);
        }

        /* --- 3. CONTAINER UTAMA (VOID GLASS) --- */
        .glass-container {
            width: 95%;
            max-width: 850px;
            margin: 80px 20px;
            padding: 50px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 4px; /* Shorter radius for a more technical look */
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8), 
                        inset 0 0 30px rgba(191, 0, 255, 0.05);
            position: relative;
            z-index: 10;
            transform-style: preserve-3d;
            transition: var(--transition-smooth);
            opacity: 0;
            transform: translateY(40px);
        }

        .glass-container.active {
            animation: containerEntry 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            text-align: center;
            font-size: 2.8rem;
            letter-spacing: 6px;
            background: linear-gradient(90deg, var(--primary-neon), var(--secondary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- 4. FORM ARCHIVE --- */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 25px;
            margin-bottom: 60px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: var(--transition-smooth);
            position: relative;
        }

        .input-box:focus-within {
            border-color: var(--secondary-neon);
            background: rgba(255, 255, 255, 0.04);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.1);
        }

        input[type="text"], textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.1rem;
            outline: none;
        }

        input[type="text"] {
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.8);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Styling Upload Gambar */
        .file-upload-label {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: rgba(191, 0, 255, 0.1);
            color: var(--primary-neon);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: var(--transition-smooth);
            border: 1px solid rgba(191, 0, 255, 0.3);
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .file-upload-label:hover {
            background: var(--primary-neon);
            color: white;
            box-shadow: 0 0 20px rgba(191, 0, 255, 0.4);
        }

        #image-preview-container {
            margin-top: 20px;
            position: relative;
            display: inline-block;
        }

        #image-preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 4px;
            border: 1px solid var(--primary-neon);
            display: block;
            filter: saturate(1.2) contrast(1.1);
        }

        .btn-remove-img {
            margin-top: 10px;
            background: transparent;
            color: #ff4d4d;
            border: 1px solid #ff4d4d;
            padding: 6px 15px;
            border-radius: 2px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-remove-img:hover {
            background: #ff4d4d;
            color: white;
        }

        .form-footer {
            display: flex;
            gap: 20px;
        }

        .category-select {
            background: #000;
            color: var(--secondary-neon);
            border: 1px solid rgba(0, 242, 255, 0.3);
            padding: 14px 25px;
            border-radius: 4px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            outline: none;
            cursor: pointer;
            transition: var(--transition-smooth);
            flex: 1;
            letter-spacing: 1px;
        }

        .category-select:focus {
            border-color: var(--secondary-neon);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .category-select option {
            background: #0a0a0f;
            color: white;
        }

        .btn-save {
            background: var(--primary-neon);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition-smooth);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.95rem;
            flex: 1;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn-save:hover {
            background: white;
            color: black;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.4);
            transform: translateY(-3px);
        }

        /* --- 5. DATA LOG (NOTES LIST) --- */
        #notes-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .note-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 2px solid var(--primary-neon);
            border-radius: 4px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }

        .note-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent, rgba(191, 0, 255, 0.03));
            pointer-events: none;
        }

        .note-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(0, 242, 255, 0.3);
            transform: scale(1.01);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .note-title {
            font-size: 1.4rem;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;
            letter-spacing: 1px;
        }

        .badge-category {
            background: rgba(191, 0, 255, 0.1);
            color: var(--primary-neon);
            padding: 5px 12px;
            border-radius: 2px;
            font-size: 0.7rem;
            font-weight: 700;
            border: 1px solid rgba(191, 0, 255, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .note-body {
            font-size: 1rem;
            font-weight: 300;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            white-space: pre-wrap; 
        }

        .note-image-display {
            max-width: 100%;
            max-height: 500px;
            border-radius: 2px;
            margin-top: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            object-fit: contain;
            background: #000;
        }

        .note-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }

        .time {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .time::before {
            content: '';
            width: 4px;
            height: 4px;
            background: var(--secondary-neon);
            border-radius: 50%;
        }

        .btn-del {
            background: transparent;
            border: 1px solid rgba(255, 77, 77, 0.3);
            color: #ff4d4d;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 8px 16px;
            transition: 0.3s;
            border-radius: 2px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-del:hover {
            background: #ff4d4d;
            color: #fff;
        }

        /* --- 6. KEYFRAMES --- */
        @keyframes containerEntry {
            from { opacity: 0; transform: translateY(40px) rotateX(-5deg); }
            to { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-30px) rotate(5deg); }
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); filter: brightness(1); }
            100% { transform: translate(-50%, -50%) scale(1.15); filter: brightness(1.3); }
        }

        @keyframes spinOrbit1 { 100% { transform: translate(-50%, -50%) rotateZ(45deg) rotateX(70deg) rotate(360deg); } }
        @keyframes spinOrbit2 { 100% { transform: translate(-50%, -50%) rotateZ(-45deg) rotateX(70deg) rotate(360deg); } }
        @keyframes spinOrbit3 { 100% { transform: translate(-50%, -50%) rotateZ(90deg) rotateX(70deg) rotate(360deg); } }

        /* --- 7. RESPONSIVE --- */
        @media (max-width: 600px) {
            .glass-container { padding: 30px 20px; margin: 40px 10px; }
            .intro-title { font-size: 3rem; }
            h1 { font-size: 2rem; }
            .form-footer { flex-direction: column; }
            .css-atom { transform: scale(0.5); top: -30px; right: -40px; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050508; }
        ::-webkit-scrollbar-thumb { background: var(--primary-neon); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: var(--secondary-neon); }

    </style>
</head>
<body>

    <div id="intro-screen">
        <h1 class="intro-title">AETHER</h1>
        <p class="intro-subtitle">Neural Interface & Data Archive</p>
        <button id="start-btn" class="btn-start">INITIALIZE SYSTEM</button>
    </div>

    <div class="css-atom">
        <div class="nucleus"></div>
        <div class="orbit"><div class="electron"></div></div>
        <div class="orbit"><div class="electron"></div></div>
        <div class="orbit"><div class="electron"></div></div>
    </div>

    <canvas id="science-canvas"></canvas>

    <div class="glass-container" id="main-glass">
        <h1>Archives</h1>
        <p class="subtitle">Secure storage for neural observations & data fragments</p>

        <form id="notes-form">
            <div class="input-group">
                <div class="input-box">
                    <input type="text" id="note-title" placeholder="SUBJECT IDENTIFIER..." required autocomplete="off">
                    <textarea id="note-content" placeholder="Input raw data, hypothesis, or observation logs here..." required></textarea>
                    
                    <label for="note-image" class="file-upload-label">
                        📡 CAPTURE VISUAL DATA (OPTIONAL)
                    </label>
                    <input type="file" id="note-image" accept="image/*" style="display: none;">
                    
                    <div id="image-preview-container" style="display: none;">
                        <img id="image-preview" src="" alt="Neural Preview">
                        <br>
                        <button type="button" id="remove-image-btn" class="btn-remove-img">PURGE DATA</button>
                    </div>

                </div>
                <div class="form-footer">
                    <select id="note-category" class="category-select">
                        <option value="🧬 BIOLOGICAL">🧬 BIOLOGICAL</option>
                        <option value="🌀 QUANTUM">🌀 QUANTUM</option>
                        <option value="🧪 CHEMICAL">🧪 CHEMICAL</option>
                        <option value="💾 NEURAL/COMP">💾 NEURAL/COMP</option>
                        <option value="📐 GEOMETRIC">📐 GEOMETRIC</option>
                        <option value="🌑 VOID/IDEAS">🌑 VOID/IDEAS</option>
                    </select>
                    <button type="submit" class="btn-save" id="save-btn">UPLOAD TO CORE</button>
                </div>
            </div>
        </form>

        <div id="notes-list">
            </div>
    </div>

    <script>
        // --- 1. LOGIKA INTRO SCREEN ---
        document.getElementById('start-btn').addEventListener('click', () => {
            const intro = document.getElementById('intro-screen');
            const glass = document.getElementById('main-glass');
            
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.visibility = 'hidden';
                glass.classList.add('active'); 
            }, 1200);
        });

        // --- 2. CANVAS ANIMATION (NEURAL NETWORK) ---
        const canvas = document.getElementById('science-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];
        let mouse = { x: null, y: null, radius: 180 };

        window.addEventListener('mousemove', (event) => {
            mouse.x = event.clientX;
            mouse.y = event.clientY;
        });

        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 10000;
            
            for (let i = 0; i < numberOfParticles; i++) {
                let size = (Math.random() * 1.5) + 0.5;
                let x = (Math.random() * ((innerWidth - size * 2) - (size * 2)) + size * 2);
                let y = (Math.random() * ((innerHeight - size * 2) - (size * 2)) + size * 2);
                let directionX = (Math.random() * 0.8) - 0.4;
                let directionY = (Math.random() * 0.8) - 0.4;
                // Theme colors: Magenta or Cyan
                let color = Math.random() > 0.5 ? '#bf00ff' : '#00f2ff';
                
                particlesArray.push(new Particle(x, y, directionX, directionY, size, color));
            }
        }

        class Particle {
            constructor(x, y, directionX, directionY, size, color) {
                this.x = x;
                this.y = y;
                this.directionX = directionX;
                this.directionY = directionY;
                this.size = size;
                this.color = color;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2, false);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
            update() {
                if (this.x > canvas.width || this.x < 0) {
                    this.directionX = -this.directionX;
                }
                if (this.y > canvas.height || this.y < 0) {
                    this.directionY = -this.directionY;
                }

                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < mouse.radius + this.size){
                    if (mouse.x < this.x && this.x < canvas.width - this.size * 10) {
                        this.x += 1.5;
                    }
                    if (mouse.x > this.x && this.x > this.size * 10) {
                        this.x -= 1.5;
                    }
                    if (mouse.y < this.y && this.y < canvas.height - this.size * 10) {
                        this.y += 1.5;
                    }
                    if (mouse.y > this.y && this.y > this.size * 10) {
                        this.y -= 1.5;
                    }
                }

                this.x += this.directionX;
                this.y += this.directionY;
                this.draw();
            }
        }

        function connectParticles() {
            let opacityValue = 1;
            for (let a = 0; a < particlesArray.length; a++) {
                for (let b = a; b < particlesArray.length; b++) {
                    let distance = ((particlesArray[a].x - particlesArray[b].x) * (particlesArray[a].x - particlesArray[b].x))
                                 + ((particlesArray[a].y - particlesArray[b].y) * (particlesArray[a].y - particlesArray[b].y));
                    
                    if (distance < (canvas.width/8) * (canvas.height/8)) {
                        opacityValue = 1 - (distance / 25000);
                        ctx.strokeStyle = `rgba(191, 0, 255, ${opacityValue * 0.15})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particlesArray[a].x, particlesArray[a].y);
                        ctx.lineTo(particlesArray[b].x, particlesArray[b].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animateCanvas() {
            requestAnimationFrame(animateCanvas);
            ctx.clearRect(0, 0, innerWidth, innerHeight);
            
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
            }
            connectParticles();
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initCanvas();
        });

        // --- 3. EFEK 3D TILT ---
        const glass = document.getElementById('main-glass');
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            
            const rotateX = (y - centerY) / 80;
            const rotateY = (centerX - x) / 80;

            glass.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        // --- 4. LOGIKA APLIKASI ARCHIVE ---
        const form = document.getElementById('notes-form');
        const titleInput = document.getElementById('note-title');
        const contentInput = document.getElementById('note-content');
        const categoryInput = document.getElementById('note-category');
        const listContainer = document.getElementById('notes-list');
        
        const imageInput = document.getElementById('note-image');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');
        let currentImageData = null; 

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 1000; 
                        const scaleSize = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleSize;
                        
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        currentImageData = canvas.toDataURL('image/jpeg', 0.8); 
                        imagePreview.src = currentImageData;
                        imagePreviewContainer.style.display = 'block';
                    }
                    img.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        removeImageBtn.addEventListener('click', () => {
            imageInput.value = '';
            currentImageData = null;
            imagePreviewContainer.style.display = 'none';
        });

        let notes = JSON.parse(localStorage.getItem('scientia_notes_archive')) || [];

        function saveNotes() {
            try {
                localStorage.setItem('scientia_notes_archive', JSON.stringify(notes));
            } catch (e) {
                alert("Storage Critical: Memory full. Purge old archives to save new data.");
            }
        }

        function renderNotes() {
            listContainer.innerHTML = '';
            
            [...notes].reverse().forEach((note, index) => {
                const card = document.createElement('div');
                card.className = 'note-card';
                card.style.animationDelay = `${index * 0.1}s`;

                const imageHTML = note.image ? `<img src="${note.image}" class="note-image-display" alt="Archive Visual">` : '';

                card.innerHTML = `
                    <div class="note-header">
                        <h2 class="note-title">${note.title}</h2>
                        <span class="badge-category">${note.category}</span>
                    </div>
                    <div class="note-body">${note.content}</div>
                    ${imageHTML}
                    <div class="note-footer">
                        <span class="time">${note.date}</span>
                        <button class="btn-del" onclick="deleteNote(${note.id})">PURGE ENTRY</button>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const title = titleInput.value.trim();
            const content = contentInput.value.trim();
            const cat = categoryInput.value;
            if (!title || !content) return;

            const newNote = {
                id: Date.now(),
                title: title,
                content: content,
                category: cat,
                image: currentImageData,
                date: new Date().toLocaleDateString('id-ID', { 
                    day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' 
                })
            };

            notes.push(newNote);
            saveNotes();
            renderNotes();
            
            titleInput.value = '';
            contentInput.value = '';
            imageInput.value = '';
            currentImageData = null;
            imagePreviewContainer.style.display = 'none';
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        window.deleteNote = (id) => {
            const target = event.target.closest('.note-card');
            target.style.transform = 'translateX(100px) scale(0.9)';
            target.style.opacity = '0';
            
            setTimeout(() => {
                notes = notes.filter(n => n.id !== id);
                saveNotes();
                renderNotes();
            }, 400);
        };

        // Initialize Call
        initCanvas();
        animateCanvas();
        renderNotes();
        
        console.log("%c🌑 AETHER Neural System Online", "color: #bf00ff; font-size: 18px; font-weight: bold; text-shadow: 0 0 10px #bf00ff;");
    </script>
</body>
</html>
